<svg style="--bf-chip:#111111;--bf-chip-border:#1F1F1F;--bf-text:#FFFFFF;--bf-text2:#B8B8B8;--bf-muted:#A0A0A0;--acc-blue:#5B8DEF;--acc-cyan:#53D8E8;--acc-green:#4ADE80;--acc-red:#F87171" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, sans-serif">
  <defs>
    <radialGradient id="fgC" cx="35%" cy="28%" r="95%">
      <stop offset="0%" stop-color="#262A4A"/>
      <stop offset="55%" stop-color="#14162B"/>
      <stop offset="100%" stop-color="#080910"/>
    </radialGradient>
  </defs>
  <rect x="66" y="8" width="88" height="24" rx="12" style="fill:var(--bf-chip);stroke:var(--bf-chip-border)"/>
  <text x="110" y="24" text-anchor="middle" font-size="13" font-weight="700" style="fill:var(--bf-text)">Chin tuck</text>

  <line x1="42" y1="70" x2="42" y2="150" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7" style="stroke:var(--bf-muted)"/>
  <line x1="178" y1="70" x2="178" y2="150" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7" style="stroke:var(--bf-muted)"/>
  <g fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="stroke:var(--acc-blue)">
    <path d="M84 58 H62 M62 58 L68 52 M62 58 L68 64"/>
    <animate attributeName="opacity" values="1;0.2;1;0.25;1" keyTimes="0;0.2;0.5;0.7;1" dur="8s" repeatCount="indefinite"/>
  </g>
  <g fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="stroke:var(--acc-blue)">
    <path d="M136 58 H158 M158 58 L152 52 M158 58 L152 64"/>
    <animate attributeName="opacity" values="0.25;0.25;1;0.2;0.25" keyTimes="0;0.5;0.55;0.85;1" dur="8s" repeatCount="indefinite"/>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0; -12 0; -12 0; 0 0; 0 0; 12 0; 12 0; 0 0; 0 0"
      keyTimes="0;0.12;0.35;0.45;0.5;0.62;0.85;0.95;1" dur="8s" repeatCount="indefinite"/>
    <rect x="50" y="78" width="120" height="84" rx="42" fill="#2A2D35"/>
    <rect x="55" y="83" width="110" height="74" rx="37" fill="url(#fgC)" stroke="#C9CCD1" stroke-width="3"/>
    <path d="M82 92 C104 84 138 86 152 98 C158 103 158 114 150 117 C142 120 136 112 124 105 C110 97 92 96 82 92 Z" fill="#9DA1A9" opacity="0.85"/>
    <path d="M84 90 C106 82 140 84 154 97" stroke="#E8EAEE" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
    <ellipse cx="76" cy="146" rx="9" ry="4" fill="#8A8E96" opacity="0.5" transform="rotate(-18 76 146)"/>
    <!-- focused dash eyes -->
    <rect x="84" y="121" width="16" height="5" rx="2.5" style="fill:var(--acc-blue)"/>
    <rect x="120" y="121" width="16" height="5" rx="2.5" style="fill:var(--acc-blue)"/>
  </g>

  <rect x="26" y="192" width="168" height="24" rx="12" style="fill:var(--bf-chip);stroke:var(--bf-chip-border)"/>
  <text x="110" y="202" text-anchor="middle" font-size="9.5" style="fill:var(--bf-text2)">Glide head back — both sides, no tilting</text>
  <text x="110" y="212" text-anchor="middle" font-size="9.5" style="fill:var(--bf-text2)">Hold 5 s each &#183; repeat &#215;10</text>
</svg>
