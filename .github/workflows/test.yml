name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcairo2 libcairo2-dev pkg-config libegl1 libgl1

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cairo pkg-config

      - name: Install package
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ "$RUNNER_OS" == "macOS" ]; then
            pip install -e ".[macos]"
          else
            pip install -e .
          fi

      - name: Run test suite
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONUTF8: "1"   # Windows cp1252 console chokes on ≈/✓ in test output
        run: python -m unittest discover -s tests -v
